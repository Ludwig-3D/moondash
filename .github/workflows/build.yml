name: Build

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    container: debian:12

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev clang mold

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend audit
        run: npm audit --audit-level=high

      - name: Frontend build
        run: npm run build --if-present

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust audit
        working-directory: src-tauri
        run: cargo audit || true

      - name: Rust build check
        working-directory: src-tauri
        run: cargo check --all-targets

  build-linux:
    name: Build Linux ${{ matrix.arch }} ${{ matrix.osname }}
    needs: audit
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debian: "12"
            osname: bookworm
          - arch: amd64
            runner: ubuntu-latest
            debian: "13"
            osname: trixie
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "12"
            osname: bookworm
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "13"
            osname: trixie

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev clang mold binutils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: npm run tauri build

      - name: Verify GLIBC requirement
        run: |
          ldd --version
          if [ -f "src-tauri/target/release/moondash" ]; then
            objdump -T src-tauri/target/release/moondash | grep GLIBC_ | sort -Vu | tail -n 30 || true
          fi

      - name: Collect artifacts
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          OUT_DIR="dist-artifacts/${{ matrix.osname }}-${{ matrix.arch }}"
          mkdir -p "$OUT_DIR"

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"
          if [ -n "$DEB_FILE" ]; then
            cp -v "$DEB_FILE" "$OUT_DIR/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}.deb"
          fi

          if [ -f "src-tauri/target/release/moondash" ]; then
            cp -v "src-tauri/target/release/moondash" "$OUT_DIR/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            chmod +x "$OUT_DIR/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moondash-${{ matrix.osname }}-${{ matrix.arch }}
          path: dist-artifacts/${{ matrix.osname }}-${{ matrix.arch }}
          if-no-files-found: error