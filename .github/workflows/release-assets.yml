name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    name: Build release Linux ${{ matrix.arch }} ${{ matrix.osname }}
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            debian: "12"
            osname: bookworm
            cross: "false"

          - arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            debian: "13"
            osname: trixie
            cross: "false"

          - arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            debian: "12"
            osname: bookworm
            cross: "false"

          - arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            debian: "13"
            osname: trixie
            cross: "false"

          - arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            debian: "12"
            osname: bookworm
            cross: "true"

          - arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            debian: "13"
            osname: trixie
            cross: "true"

    steps:
      - name: Install native build tools
        if: matrix.cross == 'false'
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev clang mold binutils

      - name: Install armhf cross build tools
        if: matrix.cross == 'true'
        run: |
          dpkg --add-architecture armhf

          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config patchelf clang mold binutils \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            libssl-dev:armhf \
            libglib2.0-dev:armhf \
            libgtk-3-dev:armhf \
            libwebkit2gtk-4.1-dev:armhf \
            libayatana-appindicator3-dev:armhf \
            librsvg2-dev:armhf

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Configure armhf cross environment
        if: matrix.cross == 'true'
        run: |
          mkdir -p .cargo

          cat > .cargo/config.toml <<'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"

          [target.armv7-unknown-linux-gnueabihf.env]
          PKG_CONFIG_ALLOW_CROSS = "1"
          PKG_CONFIG_PATH = "/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig"
          PKG_CONFIG_LIBDIR = "/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig"
          OPENSSL_DIR = "/usr"
          OPENSSL_LIB_DIR = "/usr/lib/arm-linux-gnueabihf"
          OPENSSL_INCLUDE_DIR = "/usr/include"
          EOF

      - name: Build Tauri app
        if: matrix.cross == 'false'
        run: npm run tauri build

      - name: Build Tauri app armhf
        if: matrix.cross == 'true'
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: npm run tauri build -- --target armv7-unknown-linux-gnueabihf

      - name: Prepare release assets
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets

          if [ "${{ matrix.cross }}" = "true" ]; then
            SEARCH_DIR="src-tauri/target/${{ matrix.rust_target }}/release"
            BIN_FILE="src-tauri/target/${{ matrix.rust_target }}/release/moondash"
          else
            SEARCH_DIR="src-tauri/target/release"
            BIN_FILE="src-tauri/target/release/moondash"
          fi

          DEB_FILE="$(find "$SEARCH_DIR/bundle" -type f -name "*.deb" | head -n 1 || true)"

          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found in $SEARCH_DIR/bundle"
            find src-tauri/target -maxdepth 5 -type f | sort || true
            exit 1
          fi

          cp "$DEB_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}.deb"

          if [ -f "$BIN_FILE" ]; then
            cp "$BIN_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            chmod +x "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-moondash-${{ matrix.osname }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.deb
            release-assets/moondash_*_amd64
            release-assets/moondash_*_arm64
            release-assets/moondash_*_armhf