name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    name: Build release Linux ${{ matrix.arch }} ${{ matrix.osname }}
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debian: "12"
            osname: bookworm
          - arch: amd64
            runner: ubuntu-latest
            debian: "13"
            osname: trixie
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "12"
            osname: bookworm
          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "13"
            osname: trixie

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev clang mold binutils

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare release assets
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found"
            exit 1
          fi

          cp "$DEB_FILE" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}.deb"

          if [ -f "src-tauri/target/release/moondash" ]; then
            cp "src-tauri/target/release/moondash" "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            chmod +x "release-assets/moondash_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-moondash-${{ matrix.osname }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.deb
            release-assets/moondash_*_amd64
            release-assets/moondash_*_arm64